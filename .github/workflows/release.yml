name: Windows Release Build

on:
  push:
    tags:
      - "v*" # Trigger: git tag v2.0.0 && git push origin v2.0.0

permissions:
  contents: write

jobs:
  # --- BUILD WINDOWS ---
  windows-release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qt5compat'

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Release
        run: |
          cargo build --release

      - name: Prepare Dist Folder
        run: |
          $dist = "packaging\windows\dist"
          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          New-Item -ItemType Directory -Path $dist | Out-Null

          # Copy binary (cargo outputs LoonixTunesWin64v2.exe now)
          Copy-Item "target\release\LoonixTunesWin64v2.exe" "$dist\LoonixTunesWin64v2.exe"

          # Copy QML files
          Copy-Item -Path "qml" -Destination "$dist\qml" -Recurse -Force

      - name: Deploy Qt Runtime
        run: |
          $qtDir = "C:\Qt\6.8.3\msvc2022_64\bin"
          $dist = "packaging\windows\dist"
          & "$qtDir\windeployqt.exe" --release --qmldir "qml" "$dist\LoonixTunesWin64v2.exe"

      - name: Copy FFmpeg DLLs
        run: |
          $ffmpegPath = "C:\dev\ffmpeg\bin"
          $dist = "packaging\windows\dist"
          if (Test-Path $ffmpegPath) {
            Copy-Item "$ffmpegPath\av*.dll" $dist
            Copy-Item "$ffmpegPath\sw*.dll" $dist
          }

      - name: Create Portable ZIP
        run: |
          $dist = "packaging\windows\dist"
          $zipPath = "packaging\windows\LoonixTunesWin64v2.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $zipPath -Force

      - name: Build Installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "packaging\windows\loonix-tunes-setup.iss"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loonix-tunes-windows-packages
          path: |
            packaging/windows/LoonixTunesWin64v2.zip
            Output/LoonixTunesWin64v2.exe

  # --- PUBLISH EVERYTHING ---
  publish:
    needs: [windows-release]
    runs-on: windows-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/LoonixTunesWin64v2.zip
            artifacts/**/LoonixTunesWin64v2.exe
          body: "Loonix-Tunes ${{ github.ref_name }} Release 🚀\n\nEfficient, Native, and Fast. Windows Edition."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}